<!DOCTYPE html>
<html>
<head>
  <title>JWT Refresh Token Demo</title>
</head>
<body>
  <h2>JWT + Refresh Token Demo</h2>

  <button onclick="login()">Login</button>
  <button onclick="callNormal()">Download Failed</button>
  <button onclick="callProtected()">Download subtitles</button>
  <button onclick="refreshToken()">Refresh Token</button>

  <script>
    let accessToken = "";

    async function login() {
      console.log("🔐 Logging in...");

      const res = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: "aniruddha" }),
        credentials: "include"
      });

      const data = await res.json();
      accessToken = data.accessToken;

      console.log("✅ Access Token:", accessToken);
      console.log("👉 Refresh token stored in cookie (check Application tab)");
    }

    async function callNormal() {      
     // Attach current access token to request
     const authOptions = {
        headers: {
          "Authorization": "Bearer " + accessToken
        }
      };

      let res = await fetch("http://localhost:3000/protected", authOptions);

      // If 401, try refreshing the token once
      if (res.status === 401) {
        console.warn("⚠️ Got 401. Token expired...");
      }
    }

    async function refreshToken() {
      console.log("🔄 Refreshing access token...");

      const res = await fetch("http://localhost:3000/refresh", {
        method: "POST",
        credentials: "include"
      });

      if (!res.ok) {
        console.error("❌ Refresh token expired or invalid. Please login again.");
        accessToken = "";
        return false; // refresh failed
      }

      const data = await res.json();
      accessToken = data.accessToken;

      console.log("🆕 New Access Token:", accessToken);
      return true; // refresh succeeded
    }

    async function callProtected() {
      console.log("🔒 Calling protected API...");

      const res = await fetchWithAutoRefresh("http://localhost:3000/protected", {
        method: "GET"
      });

      if (res) {
        const text = await res.text();
        console.log("📦 Response:", text);
      }
    }

    // ✅ Core logic: fetch with automatic 401 → refresh → retry
    async function fetchWithAutoRefresh(url, options = {}) {
      // Attach current access token to request
      const authOptions = {
        ...options,
        headers: {
          ...(options.headers || {}),
          "Authorization": "Bearer " + accessToken
        }
      };

      let res = await fetch(url, authOptions);

      // If 401, try refreshing the token once
      if (res.status === 401) {
        console.warn("⚠️ Got 401. Attempting token refresh...");

        const refreshed = await refreshToken();

        if (!refreshed) {
          console.error("🚫 Could not refresh token. User must log in again.");
          return null;
        }

        // Retry original request with new access token
        console.log("🔁 Retrying original request with new token...");
        res = await fetch(url, {
          ...options,
          headers: {
            ...(options.headers || {}),
            "Authorization": "Bearer " + accessToken
          }
        });
      }

      return res;
    }
  </script>
</body>
</html>
