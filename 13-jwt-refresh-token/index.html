<!DOCTYPE html>
<html>
<head>
  <title>JWT Refresh Token Demo</title>
</head>
<body>
  <h2>JWT + Refresh Token Demo</h2>

  <button onclick="login()">Login</button>
  <button onclick="callProtected()">Call Protected API</button>
  <button onclick="refreshToken()">Refresh Access Token</button>

  <script>
    let accessToken = "";

    async function login() {
      console.log("🔐 Logging in...");

      const res = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username: "aniruddha" }),
        credentials: "include"
      });

      const data = await res.json();
      accessToken = data.accessToken;

      console.log("✅ Access Token:", accessToken);
      console.log("👉 Refresh token stored in cookie (check Application tab)");
    }

    async function callProtected() {
      console.log("🔒 Calling protected API..." +accessToken);

      const res = await fetch("http://localhost:3000/protected", {
        method: "GET",
        headers: {
          "Authorization": "Bearer " + accessToken
        }
      });

      const text = await res.text();
      console.log("📦 Response:", text);
    }

    async function refreshToken() {
      console.log("🔄 Refreshing access token...");

      const res = await fetch("http://localhost:3000/refresh", {
        method: "POST",
        credentials: "include" // sends cookie automatically
      });

      const data = await res.json();
      accessToken = data.accessToken;

      console.log("🆕 New Access Token:", accessToken);
    }
  </script>
</body>
</html>
